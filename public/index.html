<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Prodakhen</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: #0b0b0f;
  color: #fff;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

.logo {
  font-size:20px;
  color:#ff4da6;
}

nav button {
  background:none;
  border:none;
  color:#fff;
  margin-left:20px;
  cursor:pointer;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width:100%;
  height:250px;
  object-fit:cover;
}

.card-body {
  padding:15px;
}

.services button {
  margin:5px;
  padding:5px 10px;
  border:none;
  border-radius:8px;
  background:#ff4da6;
  color:#fff;
  cursor:pointer;
}

/* CHAT */
.chat {
  position:fixed;
  right:20px;
  bottom:20px;
  width:300px;
  height:400px;
  background:#111;
  border-radius:15px;
  display:flex;
  flex-direction:column;
}

.messages {
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg {
  margin:5px;
  padding:8px;
  border-radius:10px;
  max-width:70%;
}

.user {
  background:#ff4da6;
  align-self:flex-end;
}

.operator {
  background:#333;
}

.input {
  display:flex;
}

.input input {
  flex:1;
  border:none;
  padding:10px;
}

.input button {
  background:#ff4da6;
  border:none;
  padding:10px;
  color:#fff;
}
</style>
</head>

<body>

<header>
  <div class="logo">Prodakhen</div>
  <nav>
    <button>Девушки</button>
    <button>Чат</button>
  </nav>
</header>

<div class="grid" id="girls"></div>

<div class="chat">
  <div class="messages" id="messages"></div>
  <div class="input">
    <input id="msgInput" placeholder="Сообщение...">
    <button onclick="send()">➤</button>
  </div>
</div>

<script>
const API = "";

async function loadGirls(){
  const res = await fetch(API + "/api/girls");
  const data = await res.json();

  const container = document.getElementById("girls");
  container.innerHTML = "";

  data.forEach(g => {
    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <img src="${g.photo}">
      <div class="card-body">
        <h3>${g.name}</h3>
        <p>${g.description || ""}</p>
        <div class="services">
          ${g.services.map(s => `<button onclick="order('${g._id}','${s.name}')">${s.name} ${s.price}</button>`).join("")}
        </div>
      </div>
    `;

    container.appendChild(el);
  });
}

function order(id, service){
  sendMessage("Выбрана услуга: " + service);
}

function send(){
  const input = document.getElementById("msgInput");
  sendMessage(input.value);
  input.value="";
}

function sendMessage(text){
  const msg = document.createElement("div");
  msg.className="msg user";
  msg.innerText=text;
  document.getElementById("messages").appendChild(msg);
}

loadGirls();
</script>

</body>
</html>
