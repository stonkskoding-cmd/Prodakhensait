<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BABYGIRL_LNR</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  color:#fff;
  height:100vh;
  background: radial-gradient(circle at 20% 30%, #2a0f2f, #05050a);
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
}

/* LOGO */
.logo {
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:600;
  color:#ff4da6;
}

/* HEART */
.heart {
  width:18px;
  height:18px;
  background:#ff4da6;
  transform: rotate(-45deg);
  position:relative;
}

.heart::before,
.heart::after {
  content:"";
  width:18px;
  height:18px;
  background:#ff4da6;
  border-radius:50%;
  position:absolute;
}

.heart::before { top:-9px; left:0; }
.heart::after { left:9px; top:0; }

/* NAV CENTER */
.nav-center {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  background: rgba(255,255,255,0.05);
  padding:5px;
  border-radius:20px;
}

/* NAV BUTTON */
.nav-btn {
  padding:8px 14px;
  border-radius:15px;
  font-size:14px;
  opacity:0.7;
}

.active {
  background: rgba(255,255,255,0.08);
  opacity:1;
}

/* PROFILE ICON */
.profile {
  width:35px;
  height:35px;
  border-radius:50%;
  background:#1a1a25;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CENTER CONTENT */
.center {
  text-align:center;
  margin-top:120px;
}

.center h1 {
  font-size:32px;
  background: linear-gradient(90deg,#ff4da6,#c44dff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.center p {
  opacity:0.6;
  margin-top:10px;
}

/* WARNING */
.warning {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  border-radius:12px;
  border:1px solid rgba(255,0,0,0.4);
  background: rgba(255,0,0,0.08);
  font-size:13px;
}

/* FOOTER */
.footer {
  position:absolute;
  bottom:30px;
  width:100%;
  text-align:center;
  font-size:12px;
  opacity:0.5;
}
</style>
</head>

<body>

<header>

  <div class="logo">
    <div class="heart"></div>
    BABYGIRL_LNR
  </div>

  <div class="nav-center">
    <div class="nav-btn active">👱‍♀️ Девушки</div>
    <div class="nav-btn">💬 Чат</div>
    <div class="nav-btn">🏙 Города</div>
  </div>

  <div class="profile">👤</div>

</header>

<div class="center">
  <h1>Анкеты девушек</h1>
  <p>Выберите идеальную компанию для незабываемого вечера</p>
</div>

<div class="warning">
⚠️ Данный сайт содержит материалы 18+. Доступ разрешён только лицам старше 18 лет.
</div>

<div class="footer">
BABYGIRL_LNR — сервис знакомств. Все услуги предоставляются по взаимному согласию.
</div>

</body>
</html>
