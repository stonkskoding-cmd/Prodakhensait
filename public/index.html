<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BABYGIRL_LNR</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --glass: rgba(20, 20, 30, 0.6);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent: #e91e63;
      --accent-glow: rgba(233, 30, 99, 0.4);
      --text: #fff;
      --text-muted: #aaa;
      --grad: linear-gradient(135deg, #ff6090, #e91e63, #c2185b);
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); overflow-x:hidden; }
    
    /* Video BG */
    .video-bg { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }
    .video-bg::after { content:''; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(10,10,15,0.7); backdrop-filter:blur(3px); }
    .video-bg video { width:100%; height:100%; object-fit:cover; }
    
    /* Layout */
    .app { min-height:100vh; display:flex; flex-direction:column; padding-top:70px; }
    header { position:fixed; top:0; left:0; right:0; height:64px; background:rgba(10,10,15,0.85); backdrop-filter:blur(15px); border-bottom:1px solid var(--glass-border); display:flex; align-items:center; padding:0 16px; z-index:100; justify-content:space-between; }
    .logo { font-weight:900; font-size:1.1rem; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; cursor:pointer; display:flex; align-items:center; gap:8px; }
    .nav { display:flex; gap:8px; }
    .nav-btn { background:none; border:none; color:var(--text-muted); padding:8px 12px; border-radius:8px; font-weight:600; font-size:0.85rem; cursor:pointer; transition:0.3s; }
    .nav-btn.active { color:#fff; background:rgba(255,255,255,0.1); }
    .profile-btn { width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.1rem; position:relative; }
    
    /* Sections */
    .section { display:none; padding:20px; max-width:1200px; margin:0 auto; animation:fadeIn 0.4s; flex:1; }
    .section.active { display:block; }
    @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
    
    /* Catalog */
    .filters { display:flex; gap:10px; margin-bottom:25px; justify-content:center; flex-wrap:wrap; }
    .filter-btn { background:var(--glass); border:1px solid var(--glass-border); color:var(--text-muted); padding:8px 18px; border-radius:20px; cursor:pointer; transition:0.3s; }
    .filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 0 15px var(--accent-glow); }
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:20px; }
    .card { background:var(--glass); border:1px solid var(--glass-border); border-radius:20px; overflow:hidden; cursor:pointer; transition:0.4s; position:relative; }
    .card:hover { transform:translateY(-5px); box-shadow:0 10px 30px rgba(0,0,0,0.5); border-color:rgba(233,30,99,0.3); }
    .card-img { width:100%; height:280px; object-fit:cover; background:#1a1a2e; }
    .card-body { padding:16px; }
    .card-title { font-size:1.2rem; font-weight:700; margin-bottom:4px; }
    .card-city { color:var(--accent); font-size:0.85rem; margin-bottom:10px; display:inline-block; }
    .tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
    .tag { font-size:0.7rem; background:rgba(255,255,255,0.05); padding:4px 8px; border-radius:6px; color:var(--text-muted); }
    .card-actions { display:flex; gap:10px; margin-top:12px; }
    .btn { flex:1; padding:10px; border:none; border-radius:10px; font-weight:700; cursor:pointer; transition:0.3s; font-family:inherit; }
    .btn-primary { background:var(--grad); color:#fff; }
    .btn-primary:hover { box-shadow:0 5px 15px var(--accent-glow); }
    .btn-sec { background:rgba(255,255,255,0.05); color:#fff; border:1px solid var(--glass-border); }
    
    /* Chat */
    .chat-wrap { height:calc(100vh - 100px); display:flex; flex-direction:column; background:rgba(0,0,0,0.2); border-radius:20px; border:1px solid var(--glass-border); overflow:hidden; }
    .chat-header { padding:15px; background:rgba(15,15,25,0.9); border-bottom:1px solid var(--glass-border); display:flex; justify-content:space-between; align-items:center; }
    .chat-status { font-size:0.8rem; color:var(--accent); display:flex; align-items:center; gap:6px; }
    .dot { width:8px; height:8px; background:var(--accent); border-radius:50%; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    .msgs { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:15px; }
    .msg { max-width:80%; padding:12px 16px; border-radius:16px; font-size:0.9rem; line-height:1.5; animation:popIn 0.3s; }
    @keyframes popIn { from{opacity:0; transform:scale(0.9);} to{opacity:1; transform:scale(1);} }
    .msg.bot { background:rgba(233,30,99,0.1); border:1px solid rgba(233,30,99,0.2); align-self:flex-start; border-bottom-left-radius:4px; }
    .msg.user { background:rgba(100,60,180,0.2); border:1px solid rgba(100,60,180,0.3); align-self:flex-end; border-bottom-right-radius:4px; }
    .msg-serv { display:flex; flex-direction:column; gap:8px; margin-top:10px; }
    .msg-serv-btn { background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color:#fff; padding:10px; border-radius:10px; cursor:pointer; text-align:left; transition:0.2s; }
    .msg-serv-btn:hover { background:rgba(233,30,99,0.1); border-color:var(--accent); }
    .chat-input { padding:15px; background:rgba(15,15,25,0.9); border-top:1px solid var(--glass-border); display:flex; gap:10px; }
    .chat-input input { flex:1; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:12px; padding:12px; color:#fff; outline:none; }
    .chat-input input:focus { border-color:var(--accent); }
    
    /* Modals */
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); z-index:200; display:none; align-items:center; justify-content:center; padding:20px; }
    .modal.show { display:flex; }
    .modal-box { background:#12121a; border:1px solid var(--glass-border); border-radius:24px; width:100%; max-width:450px; max-height:90vh; overflow-y:auto; position:relative; animation:slideUp 0.3s; }
    @keyframes slideUp { from{transform:translateY(20px); opacity:0;} to{transform:translateY(0); opacity:1;} }
    .modal-header { padding:20px; border-bottom:1px solid var(--glass-border); text-align:center; font-weight:700; font-size:1.2rem; }
    .modal-body { padding:20px; }
    .close-btn { position:absolute; top:15px; right:15px; background:none; border:none; color:#fff; font-size:1.2rem; cursor:pointer; }
    
    /* Inputs */
    .input-group { margin-bottom:15px; }
    .input-group label { display:block; margin-bottom:6px; font-size:0.85rem; color:var(--text-muted); }
    .input-field { width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:10px; padding:12px; color:#fff; outline:none; }
    .input-field:focus { border-color:var(--accent); }
    
    /* Admin */
    .admin-grid { display:grid; grid-template-columns:300px 1fr; gap:20px; height:calc(100vh - 120px); }
    .admin-list { background:var(--glass); border:1px solid var(--glass-border); border-radius:16px; overflow-y:auto; }
    .chat-item { padding:15px; border-bottom:1px solid var(--glass-border); cursor:pointer; transition:0.2s; }
    .chat-item:hover { background:rgba(255,255,255,0.03); }
    .chat-item.active { background:rgba(233,30,99,0.1); border-left:3px solid var(--accent); }
    .chat-item h4 { font-size:0.9rem; margin-bottom:4px; display:flex; justify-content:space-between; }
    .status-badge { font-size:0.7rem; padding:2px 6px; border-radius:4px; }
    .st-wait { background:rgba(255,150,0,0.2); color:orange; }
    .st-active { background:rgba(0,200,0,0.2); color:#0f0; }
    
    /* Responsive */
    @media(max-width:768px) {
      .grid { grid-template-columns:1fr; }
      .admin-grid { grid-template-columns:1fr; }
      .admin-list { height:200px; margin-bottom:10px; }
      .nav { gap:4px; }
      .nav-btn { padding:6px 8px; font-size:0.75rem; }
    }
  </style>
</head>
<body>
  <div class="video-bg"><video autoplay muted loop playsinline src="video/bg.mp4"></video></div>

  <header>
    <div class="logo" onclick="App.nav('girls')">💎 BABYGIRL_LNR</div>
    <div class="nav">
      <button class="nav-btn active" onclick="App.nav('girls')">Девушки</button>
      <button class="nav-btn" onclick="App.nav('chat')">Чат</button>
    </div>
    <div class="profile-btn" onclick="App.toggleProfile()">👤</div>
  </header>

  <div class="app">
    <div id="sec-girls" class="section active">
      <div class="filters" id="filters"></div>
      <div class="grid" id="girls-grid"></div>
    </div>

    <div id="sec-chat" class="section">
      <div class="chat-wrap">
        <div class="chat-header">
          <span>💬 Оператор</span>
          <div class="chat-status" id="chat-status"><div class="dot"></div> Онлайн</div>
        </div>
        <div class="msgs" id="chat-msgs"></div>
        <div class="chat-input">
          <input type="text" id="chat-inp" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')App.sendMsg()">
          <button class="btn btn-primary" style="width:auto" onclick="App.sendMsg()">➤</button>
        </div>
      </div>
    </div>

    <div id="sec-admin" class="section">
      <div class="admin-grid">
        <div class="admin-list" id="admin-list"></div>
        <div style="display:flex; flex-direction:column; gap:10px;">
          <div class="chat-wrap" style="height:auto; flex:1;">
            <div class="chat-header">
              <span id="adm-chat-title">Выберите чат</span>
              <div style="display:flex; gap:8px;">
                <button class="btn btn-sec" style="padding:4px 10px; font-size:0.7rem" onclick="App.adminClear()">🗑️</button>
              </div>
            </div>
            <div class="msgs" id="adm-msgs"></div>
            <div class="chat-input">
              <input type="text" id="adm-inp" placeholder="Ответ оператора..." onkeypress="if(event.key==='Enter')App.adminReply()">
              <button class="btn btn-primary" style="width:auto" onclick="App.adminReply()">➤</button>
            </div>
          </div>
          <button class="btn btn-sec" onclick="App.nav('girls')">⬅️ Выйти из админки</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modals -->
  <div class="modal" id="auth-modal">
    <div class="modal-box">
      <button class="close-btn" onclick="App.closeModals()">✕</button>
      <div class="modal-header">Вход</div>
      <div class="modal-body">
        <div class="input-group"><label>Ник</label><input class="input-field" id="log-nick"></div>
        <div class="input-group"><label>Пароль</label><input class="input-field" type="password" id="log-pass"></div>
        <button class="btn btn-primary" style="width:100%" onclick="App.login()">Войти</button>
        <div style="text-align:center; margin-top:15px; font-size:0.8rem; color:#aaa;">Нет аккаунта? <span style="color:var(--accent); cursor:pointer" onclick="App.register()">Регистрация</span></div>
      </div>
    </div>
  </div>

  <div class="modal" id="profile-modal">
    <div class="modal-box">
      <button class="close-btn" onclick="App.closeModals()">✕</button>
      <div class="modal-header">Профиль</div>
      <div class="modal-body" id="profile-body">
        <p id="prof-name" style="font-size:1.1rem; margin-bottom:10px;"></p>
        <button class="btn btn-sec" style="width:100%; margin-bottom:10px;" id="btn-admin" onclick="App.nav('admin')" style="display:none">⚙️ Панель управления</button>
        <button class="btn btn-sec" style="width:100%; color:var(--accent); border-color:var(--accent);" onclick="App.logout()">Выйти</button>
      </div>
    </div>
  </div>

  <script>
    const API = '/api';
    const State = {
      user: JSON.parse(localStorage.getItem('user')),
      chats: JSON.parse(localStorage.getItem('chats')) || {},
      girls: [],
      adminChat: null,
      cities: ['Луганск', 'Стаханов', 'Первомайск']
    };

    const UI = {
      el: id => document.getElementById(id),
      renderGirls() {
        const grid = UI.el('girls-grid');
        grid.innerHTML = State.girls.map(g => `
          <div class="card">
            ${g.photos?.[0] ? `<img class="card-img" src="${g.photos[0]}">` : '<div class="card-img" style="display:flex;align-items:center;justify-content:center;font-size:3rem">👩</div>'}
            <div class="card-body">
              <div class="card-title">${g.name}</div>
              <div class="card-city">📍 ${g.city}</div>
              <div class="tags">
                <span class="tag">${g.height} см</span>
                <span class="tag">${g.weight} кг</span>
                <span class="tag">${g.age} лет</span>
              </div>
              <div class="card-actions">
                <button class="btn btn-sec" onclick="App.orderGirl('${g._id}')">🔥 Заказать</button>
              </div>
            </div>
          </div>
        `).join('');
      },
      renderMsgs(containerId, msgs, isUser = true) {
        const c = UI.el(containerId);
        if(!c) return;
        c.innerHTML = msgs.map(m => {
          if(m.type === 'user') return `<div class="msg user">${m.text}</div>`;
          if(m.type === 'bot') {
            let html = m.text.replace(/\n/g, '<br>');
            if(m.extra?.type === 'services') {
              html += `<div class="msg-serv">${m.extra.girl.services.map(s => `<button class="msg-serv-btn" onclick="App.selectService('${m.extra.girl.name}','${s.name}','${s.price}')">${s.name} — ${s.price}₽</button>`).join('')}</div>`;
            } else if(m.extra?.type === 'girls_list') {
              html += `<div class="msg-serv">${m.extra.girls.map(g => `<button class="msg-serv-btn" onclick="App.selectGirl('${g.name}')">${g.name} — ${g.city}</button>`).join('')}</div>`;
            } else if(m.extra?.type === 'profile') {
              html = `<div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; margin-top:5px;">
                        <b>${m.extra.girl.name}</b> • ${m.extra.girl.city}<br>
                        ${m.extra.girl.services.map(s=>s.name+': '+s.price+'₽').join(', ')}
                      </div>`;
            }
            return `<div class="msg bot">${html}</div>`;
          }
          return '';
        }).join('');
        c.scrollTop = c.scrollHeight;
      },
      updateFilters() {
        const f = UI.el('filters');
        f.innerHTML = `<button class="filter-btn active" onclick="App.filter('all')">Все</button>` + 
          State.cities.map(c => `<button class="filter-btn" onclick="App.filter('${c}')">${c}</button>`).join('');
      },
      updateProfile() {
        if(!State.user) return;
        UI.el('prof-name').textContent = `Привет, ${State.user.username}!`;
        if(State.user.role === 'admin') UI.el('btn-admin').style.display = 'block';
      }
    };

    const App = {
      async init() {
        await this.fetchGirls();
        UI.updateFilters();
        UI.renderGirls();
        if(State.user) UI.updateProfile();
      },
      async fetchGirls(city = 'all') {
        const res = await fetch(`${API}/girls${city !== 'all' ? '?city='+city : ''}`);
        const data = await res.json();
        if(data.success) { State.girls = data.data; UI.renderGirls(); }
      },
      async login() {
        const nick = UI.el('log-nick').value;
        const pass = UI.el('log-pass').value;
        const res = await fetch(`${API}/auth/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:nick, password:pass}) });
        const data = await res.json();
        if(data.success) {
          State.user = data.user;
          localStorage.setItem('user', JSON.stringify(State.user));
          UI.updateProfile();
          this.closeModals();
        } else alert(data.message);
      },
      async register() {
        // Simplified for demo
        const nick = prompt('Придумайте никнейм:');
        if(!nick) return;
        const res = await fetch(`${API}/auth/register`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:nick, password:'123'}) });
        const data = await res.json();
        if(data.success) { alert('Пароль по умолчанию: 123'); this.login(nick, '123'); }
      },
      logout() {
        State.user = null;
        localStorage.removeItem('user');
        location.reload();
      },
      async orderGirl(id) {
        if(!State.user) return this.nav('auth');
        const res = await fetch(`${API}/chat/init`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:State.user.username, girlId:id}) });
        const data = await res.json();
        if(data.success) {
          State.chats[State.user.username] = { messages: data.messages };
          localStorage.setItem('chats', JSON.stringify(State.chats));
          this.nav('chat');
          UI.renderMsgs('chat-msgs', data.messages);
        }
      },
      async sendMsg() {
        const inp = UI.el('chat-inp');
        const text = inp.value.trim();
        if(!text || !State.user) return;
        
        // Optimistic UI
        const msgs = State.chats[State.user.username]?.messages || [];
        msgs.push({ type: 'user', text });
        UI.renderMsgs('chat-msgs', msgs);
        inp.value = '';

        const res = await fetch(`${API}/chat/send`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:State.user.username, text}) });
        const data = await res.json();
        if(data.success && data.reply) {
          msgs.push({ type: 'bot', ...data.reply });
          State.chats[State.user.username] = { messages: msgs };
          localStorage.setItem('chats', JSON.stringify(State.chats));
          UI.renderMsgs('chat-msgs', msgs);
        }
      },
      nav(page) {
        if(page === 'chat' && !State.user) return this.nav('auth');
        if(page === 'admin' && (!State.user || State.user.role !== 'admin')) return;
        
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        const sec = UI.el(`sec-${page}`);
        if(sec) sec.classList.add('active');
        
        // Highlight nav
        const navBtns = document.querySelectorAll('.nav-btn');
        if(page === 'girls') navBtns[0]?.classList.add('active');
        if(page === 'chat') { navBtns[1]?.classList.add('active'); this.loadChat(); }
        if(page === 'admin') this.loadAdmin();
      },
      async loadChat() {
        if(!State.user) return;
        const uid = State.user.username;
        if(!State.chats[uid]) {
          // Init empty chat
          const res = await fetch(`${API}/chat/send`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:uid, text:'Привет'}) });
          const data = await res.json();
          if(data.success) {
             State.chats[uid] = { messages: data.reply ? [{type:'bot',...data.reply}] : [{type:'bot', text:'Привет! Напишите город.'}] };
             UI.renderMsgs('chat-msgs', State.chats[uid].messages);
          }
        } else {
          UI.renderMsgs('chat-msgs', State.chats[uid].messages);
        }
      },
      selectService(gName, sName, price) {
        UI.el('chat-inp').value = `${gName} — ${sName}: ${price}₽`;
        this.sendMsg();
      },
      selectGirl(name) {
        UI.el('chat-inp').value = name;
        this.sendMsg();
      },
      filter(city) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        this.fetchGirls(city);
      },
      // ADMIN
      async loadAdmin() {
        const res = await fetch(`${API}/admin/chats`);
        const chats = await res.json();
        const list = UI.el('admin-list');
        list.innerHTML = chats.map(c => `
          <div class="chat-item ${State.adminChat === c.userId ? 'active' : ''}" onclick="App.openAdminChat('${c.userId}')">
            <h4>${c.userId} <span class="status-badge ${c.waitingForOperator ? 'st-wait' : 'st-active'}">${c.waitingForOperator ? 'Ждет' : 'Активен'}</span></h4>
            <div style="font-size:0.8rem; color:#aaa; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.messages[c.messages.length-1]?.text || '...'}</div>
          </div>
        `).join('');
      },
      async openAdminChat(uid) {
        State.adminChat = uid;
        UI.el('adm-chat-title').textContent = `Чат с ${uid}`;
        this.loadAdmin(); // Refresh list highlight
        const res = await fetch(`${API}/chat/${uid}`);
        const data = await res.json();
        UI.renderMsgs('adm-msgs', data.messages);
      },
      async adminReply() {
        const inp = UI.el('adm-inp');
        const text = inp.value.trim();
        if(!text || !State.adminChat) return;
        
        await fetch(`${API}/chat/admin/reply`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({userId:State.adminChat, text}) });
        inp.value = '';
        this.openAdminChat(State.adminChat);
      },
      async adminClear() {
        if(!State.adminChat) return;
        await fetch(`${API}/chat/${State.adminChat}/clear`, { method:'PUT' });
        this.openAdminChat(State.adminChat);
      },
      closeModals() {
        document.querySelectorAll('.modal').forEach(m => m.classList.remove('show'));
      },
      toggleProfile() {
        if(!State.user) return this.nav('auth');
        UI.el('profile-modal').classList.add('show');
      },
      nav(page) {
         if(page === 'auth') {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            UI.el('auth-modal').classList.add('show');
         } else {
            this.closeModals();
            this.nav(page); // Re-call original nav
         }
      }
    };

    App.init();
  </script>
